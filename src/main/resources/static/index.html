<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container mt-5">
        <h1 class="mb-4">Hotel Rooms</h1>
        <div id="roomContainer" class="row"></div>

        <hr class="my-5">

        <h2 class="mb-4">Book a Room</h2>
        <form id="bookingForm" class="row g-3 mb-5">
            <div class="col-md-3">
                <label class="form-label">Room ID</label>
                <input type="number" class="form-control" id="roomId" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">User ID</label>
                <input type="number" class="form-control" id="userId" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Check-In Date</label>
                <input type="date" class="form-control" id="checkInDate" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Check-Out Date</label>
                <input type="date" class="form-control" id="checkOutDate" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Book Room</button>
            </div>
        </form>
        <div id="bookingMessage"></div>

        <hr class="my-5">

        <h2 id="bookinglist"  class="mb-4">All Bookings</h2>
        <div id="BookingContainer" class="row"></div>
    </div>
<script src="script.js?v=2"></script>
</body>
</html>
